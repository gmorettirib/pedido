<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Festa Junina</title>
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #FFF8E7;
    font-family: 'Patrick Hand', cursive;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    gap: 32px;
    padding: 90px 20px 20px;
  }

  /* Bandeirinhas topo pagina principal */
  #bandeirinhas-principal {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    pointer-events: none;
    height: 70px;
  }

  h1 {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 6vw, 3rem);
    color: #5C2D0A;
    line-height: 1.3;
  }

  .botoes {
    display: flex;
    justify-content: center;
    gap: 24px;
    position: relative;
    min-height: 60px;
    align-items: center;
  }

  .btn {
    font-family: 'Caveat', cursive;
    font-size: 1.6rem;
    font-weight: 700;
    width: clamp(120px, 30vw, 180px);
    padding: 14px 0;
    border-radius: 50px;
    border: 3px solid #5C2D0A;
    cursor: pointer;
    box-shadow: 4px 4px 0 #5C2D0A;
    transition: transform 0.1s, box-shadow 0.1s;
  }

  .btn-sim {
    background: #2DC653;
    color: white;
  }

  .btn-sim:hover {
    transform: translate(-2px, -2px);
    box-shadow: 6px 6px 0 #5C2D0A;
  }

  .btn-sim:active {
    transform: translate(2px, 2px);
    box-shadow: 2px 2px 0 #5C2D0A;
  }

  .btn-nao {
    background: #E63946;
    color: white;
    position: fixed;
    transition: left 0.12s ease, top 0.12s ease;
  }

  /* ===== TELA DE SUCESSO ===== */
  #tela-sim {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #FFF8E7;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    gap: 28px;
    padding: 90px 20px 20px;
  }

  #tela-sim.active {
    display: flex;
    animation: scene-in 0.6s ease both;
  }

  @keyframes scene-in {
    from { opacity: 0; }
    to { opacity: 1; }
  }

  .titulo-sim {
    font-family: 'Caveat', cursive;
    font-size: clamp(2rem, 7vw, 3rem);
    color: #5C2D0A;
    z-index: 10;
    animation: bounce-in 0.8s cubic-bezier(.34,1.56,.64,1) 0.3s both;
    line-height: 1.3;
  }

  @keyframes bounce-in {
    from { transform: scale(0); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
  }

  .bandeiras-topo {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    pointer-events: none;
    height: 70px;
  }

  /* ===== SLIDESHOW ===== */
  .slideshow-wrapper {
    position: relative;
    z-index: 10;
    width: min(520px, 92vw);
  }

  .moldura {
    background: #5C2D0A;
    padding: 12px 12px 40px;
    border-radius: 4px;
    box-shadow: 6px 6px 0 #5C2D0A, 0 0 0 3px #5C2D0A;
  }

  .slide-container {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    transition: height 320ms ease;
  }

  .slide-item {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 5rem;
    background: #3a1a00;
    opacity: 0;
    transition: opacity 0.8s ease;
    border-radius: 2px;
    flex-direction: column;
    gap: 12px;
  }

  .slide-item.active { opacity: 1; }

  .slide-texto {
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    color: #FFD600;
    text-align: center;
    padding: 0 12px;
    line-height: 1.3;
  }

  .slide-legenda {
    font-family: 'Caveat', cursive;
    font-size: 1.2rem;
    color: #FFF8E7;
    text-align: center;
    margin-top: 10px;
  }

  /* ===== CONFETES ===== */
  .confete {
    position: fixed;
    top: -20px;
    pointer-events: none;
    z-index: 300;
    animation: cair linear forwards;
  }

  /* Responsive tweaks */
  @media (max-width: 520px) {
    body { padding: 60px 12px 16px; gap: 18px; }
    .botoes { flex-direction: column; gap: 12px; }
    .btn { width: min(88vw, 240px); font-size: 1.4rem; }
    .slide-legenda { font-size: 1rem; padding: 8px 6px; }
    .titulo-sim { font-size: clamp(1.6rem, 6vw, 2.4rem); }
    .player-area { padding: 8px 16px; }
    .btn-nao { position: relative !important; left: auto !important; top: auto !important; transform: none !important; }
  }

  @keyframes cair {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* Player */
  .player-area {
    z-index: 10;
    background: transparent;
    border: 2px solid #5C2D0A;
    border-radius: 50px;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .player-info {
    font-family: 'Caveat', cursive;
    color: #5C2D0A;
    font-size: 1rem;
    line-height: 1.2;
    text-align: left;
  }

  .player-titulo { font-size: 1.1rem; font-weight: 700; }
  .player-sub { opacity: 0.6; font-size: 0.9rem; }

  .barra-musica {
    height: 4px;
    background: rgba(92,45,10,0.15);
    border-radius: 4px;
    margin-top: 6px;
    overflow: hidden;
    width: 120px;
  }

  .barra-progresso {
    height: 100%;
    background: #5C2D0A;
    border-radius: 4px;
    animation: progresso 3s linear infinite;
  }

  @keyframes progresso {
    from { width: 0%; }
    to { width: 100%; }
  }

  .nota-anim {
    font-size: 1.4rem;
    color: #5C2D0A;
    animation: nota-float 1s ease-in-out infinite alternate;
  }

  @keyframes nota-float {
    from { transform: translateY(0) rotate(-5deg); }
    to { transform: translateY(-4px) rotate(5deg); }
  }
</style>
</head>
<body>

<div id="bandeirinhas-principal"></div>

<h1>Você quer ser meu par<br>na Festa Junina?</h1>

<div class="botoes" id="botoes">
  <button class="btn btn-sim" id="btn-sim" onclick="simClick()">Sim</button>
  <button class="btn btn-nao" id="btn-nao">Não</button>
</div>

<!-- TELA SIM -->
<div id="tela-sim">
  <div class="bandeiras-topo" id="bandeiras-sim"></div>

  <h2 class="titulo-sim">Ainda bem que aceitou</h2>

  

  <div class="slideshow-wrapper">
      <div class="slide-container" id="slides"></div>
      <div id="slide-legenda" class="slide-legenda"></div>
  </div>
</div>

<script>
// ===== BANDEIRINHAS =====
function criarBandeirinhas(containerId, cores, num) {
  const container = document.getElementById(containerId);
  if (!container) return;
  const w = window.innerWidth;
  const esp = w / (num - 1);
  const fy = 8, fh = 38;
  let path = `M 0 ${fy}`;
  for (let i = 1; i < num; i++) {
    const x = i * esp;
    path += ` Q ${x - esp/2} ${fy + (i%2===0?12:5)} ${x} ${fy}`;
  }
  let svg = `<svg viewBox="0 0 ${w} 65" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="none">`;
  svg += `<path d="${path}" fill="none" stroke="#5C2D0A" stroke-width="2"/>`;
  for (let i = 0; i < num; i++) {
    const x = i * esp;
    const c = cores[i % cores.length];
    svg += `<polygon points="${x-12},${fy} ${x+12},${fy} ${x},${fy+fh}" fill="${c}" stroke="#5C2D0A" stroke-width="1.5" opacity="0.92"/>`;
  }
  svg += `</svg>`;
  container.innerHTML = svg;
}

const cores = ['#FFD600','#E63946','#2DC653','#FF8C00','#1D6FA4','#FF69B4','#9B59B6'];
criarBandeirinhas('bandeirinhas-principal', cores, 16);
window.addEventListener('resize', () => {
  criarBandeirinhas('bandeirinhas-principal', cores, 16);
  criarBandeirinhas('bandeiras-sim', cores, 16);
});

// ===== BOTAO NAO FOGE =====
const btnNao = document.getElementById('btn-nao');
const btnSim = document.getElementById('btn-sim');
let tentativas = 0;

function posicaoInicial() {
  const sr = btnSim.getBoundingClientRect();
  btnNao.style.left = (sr.right + 24) + 'px';
  btnNao.style.top = sr.top + 'px';
}

function fugir() {
  const margin = 20;
  const bw = btnNao.offsetWidth;
  const bh = btnNao.offsetHeight;
  const maxX = window.innerWidth - bw - margin;
  const maxY = window.innerHeight - bh - margin;
  btnNao.style.left = (margin + Math.random() * maxX) + 'px';
  btnNao.style.top = (margin + Math.random() * maxY) + 'px';
  tentativas++;
  if (tentativas > 5) {
    const scale = Math.max(0.4, 1 - tentativas * 0.06);
    btnNao.style.transform = `scale(${scale})`;
  }
  if (tentativas === 25) {
    document.querySelector('h1').textContent = 'Aceita por favor meu amorzao';
    btnNao.style.display = 'none';
  }
}

btnNao.addEventListener('mouseover', fugir);
btnNao.addEventListener('touchstart', e => { e.preventDefault(); fugir(); });
btnNao.addEventListener('click', e => { e.preventDefault(); fugir(); });
setTimeout(posicaoInicial, 100);

// ===== SLIDES =====
const slides = [
  { img: 'img/foto1.jpeg' },
  { img: 'img/foto2.jpeg', texto: 'Festa junina juntos' },
  { img: 'img/foto3.jpeg', texto: 'Par perfeito' },
  { img: 'img/foto4.jpeg', texto: 'Nossa música' },
  { img: 'img/foto5.jpeg', texto: 'Flor do sertão' },
  { img: 'img/foto6.jpeg', texto: 'Alegria total' },
  { img: 'img/foto7.jpeg', texto: 'Par perfeito' },
  { img: 'img/foto8.jpeg', texto: 'Nossa música' },
  { img: 'img/foto9.jpeg', texto: 'Flor do sertão' },
  { img: 'img/foto10.jpeg', texto: 'Alegria total' },
];


const slidesContainer = document.getElementById('slides');
function adjustContainerSize(s) {
  if (!s || !s.nw || !s.nh) return;
  const w = slidesContainer.clientWidth || slidesContainer.offsetWidth || 300;
  const h = Math.max(120, Math.round(w * (s.nh / s.nw)));
  slidesContainer.style.height = h + 'px';
}

slides.forEach((s, i) => {
  const div = document.createElement('div');
  div.className = 'slide-item' + (i===0 ? ' active' : '');
  if (s.img) {
    // preload to get natural size
    const pre = new Image();
    pre.src = s.img;
    pre.onload = () => {
      s.nw = pre.naturalWidth;
      s.nh = pre.naturalHeight;
      if (i === 0) adjustContainerSize(s);
    };
    div.innerHTML = `<img src="${s.img}" alt="${s.texto}" style="width:100%;height:100%;object-fit:contain;display:block">`;
  } else if (s.cor) {
    div.style.background = s.cor;
    div.innerHTML = `<span style="font-family:'Caveat',cursive;font-size:5rem;color:#FFD600;font-weight:700">${s.icone || ''}</span><span class="slide-texto">${s.texto}</span>`;
  } else {
    div.innerHTML = `<span class="slide-texto">${s.texto}</span>`;
  }
  slidesContainer.appendChild(div);
});

document.getElementById('slide-legenda') && (document.getElementById('slide-legenda').textContent = slides[0].texto);
let cur = 0;
function nextSlide() {
  const all = slidesContainer.querySelectorAll('.slide-item');
  all[cur].classList.remove('active');
  cur = (cur + 1) % all.length;
  all[cur].classList.add('active');
  const legend = document.getElementById('slide-legenda');
  if (legend) legend.textContent = slides[cur].texto || '';
  // adjust container height to match the next image aspect ratio (if available)
  adjustContainerSize(slides[cur]);
}

window.addEventListener('resize', () => adjustContainerSize(slides[cur]));

// ===== CONFETES =====
const coresConf = ['#FFD600','#E63946','#2DC653','#FF8C00','#1D6FA4','#FF69B4'];
function lancarConfetes(qtd) {
  for (let i = 0; i < qtd; i++) {
    setTimeout(() => {
      const c = document.createElement('div');
      c.className = 'confete';
      c.style.left = Math.random() * 100 + 'vw';
      c.style.width = (6 + Math.random() * 8) + 'px';
      c.style.height = (10 + Math.random() * 14) + 'px';
      c.style.background = coresConf[Math.floor(Math.random() * coresConf.length)];
      c.style.borderRadius = '2px';
      c.style.animationDuration = (1.5 + Math.random() * 2) + 's';
      document.body.appendChild(c);
      setTimeout(() => c.remove(), 4000);
    }, i * 60);
  }
}

// ===== MUSICA =====
let audioCtx = null, musicaAtiva = false;
function nota(ctx, freq, t, dur, vol) {
  const o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(freq, t);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.02);
  g.gain.linearRampToValueAtTime(0, t + dur);
  o.start(t); o.stop(t + dur);
}
function tocarForro() {
  if (musicaAtiva) return;
  musicaAtiva = true;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const seq = [329.6,392,440,392,329.6,293.7,329.6,392,440,493.9,440,392,329.6,293.7,261.6,293.7];
    const bpm = 138, col = 60/bpm/2, total = seq.length * col;
    for (let loop = 0; loop < 30; loop++) {
      const off = audioCtx.currentTime + loop * total;
      seq.forEach((f, i) => {
        nota(audioCtx, f, off + i*col, col*0.85, 0.1);
        if (i%2===0) nota(audioCtx, f/2, off + i*col, col*1.8, 0.07);
      });
    }
  } catch(e) {}
}

// ===== SIM =====
function simClick() {
  lancarConfetes(60);
  tocarForro();
  setTimeout(() => {
    document.getElementById('tela-sim').classList.add('active');
    criarBandeirinhas('bandeiras-sim', cores, 16);
    btnNao.remove();
    setInterval(nextSlide, 2800);
    setInterval(() => lancarConfetes(15), 5000);
  }, 500);
}
</script>
</body>
</html>
